name: Pull Request Tests
on:
  push:
    branches:
      - master
  pull_request:
    paths-ignore:
      - '**/*.md'

jobs:
  ubuntu-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          lfs: true
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: 1.23.4
      - run: |
          sudo apt install mecab libmecab-dev mecab-ipadic-utf8
      - run: |
          CGO_LDFLAGS="$(mecab-config --libs)" CGO_CFLAGS="-I$(mecab-config --inc-dir)" go test -v ./...

  macos-test:
    runs-on: macos-latest 

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: 1.23.4
      - run: |
          brew install mecab mecab-ipadic
      - run: |
          CGO_LDFLAGS="$(mecab-config --libs)" CGO_CFLAGS="-I$(mecab-config --inc-dir)" go test -v ./...

  windows-test:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: 1.23.4
      - shell: pwsh
        run: |
          assets\mecab-0.996-64.exe
      - run: |
          CGO_LDFLAGS="$(mecab-config --libs)" CGO_CFLAGS="-I$(mecab-config --inc-dir)" go test -v ./...

